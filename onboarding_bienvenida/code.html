<body class="font-body-md text-body-md flex flex-col min-h-screen overflow-hidden">
<!-- Top Navigation Bar (Shared Component Logic - Suppression applied, but user requested Skip action) -->
<header class="flex justify-between items-center px-margin-mobile py-4 w-full bg-background relative z-10">

</div>
<button class="font-label-md text-label-md text-on-surface-variant hover:opacity-80 transition-opacity duration-200">

        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-between px-margin-mobile pb-xl relative">
<!-- Illustration Section (Bento-inspired asymmetric placement) -->
<div class="w-full max-w-md flex-grow flex items-center justify-center pt-md">
<div class="relative w-full aspect-square max-w-[320px] md:max-w-[400px]">
<!-- Decorative background elements -->
<div class="absolute inset-0 bg-primary-container opacity-10 rounded-full blur-3xl scale-110"></div>
<div class="relative z-0 overflow-hidden rounded-[40px] tonal-elevation bg-surface-container-lowest">
<img alt="Onboarding Illustration" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDMgWPNJIJC5HUrP-4WFnQ4LJtOrscBOvcednPMIyui3oqNPzPMsVu9lbggNKaB9fn3rU8J6dohOQGHpgjYwsfURfMGrJkaj8UY7Rab5reJNvaLurC8kLLbEshx5hAbOousZ0vXaYcoDqKAtEQDDFJJPXRnJYxX7qClLkkfjUj6QHkojg5AOIL1pXAp1HXkmy47vZfuaWrpHOrXoA1-I7uBeQ-YaHxOpK7nnUJ7s_xWdahczjpeuSubG_3YCVFt6dkMyMZVFIHQKCs"/>
</div>
</div>
</div>
<!-- Text and Actions Container -->
<div class="w-full max-w-xl text-center space-y-md mt-lg relative z-20">
<div class="space-y-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background tracking-tight">
                    ¡Bienvenido a iMoney!
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto md:max-w-md">
                    Toma el control total de tus finanzas y celebra cada paso hacia tu libertad financiera.
                </p>
</div>
<!-- Primary Action -->
<div class="pt-base">
<button class="w-full md:w-auto md:px-xl py-4 bg-primary text-on-primary rounded-xl font-label-md text-label-md shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300">
                    Siguiente
                </button>
</div>
</div>
<!-- Pagination Controls (Shared Component Logic Integration) -->
<footer class="mt-xl flex flex-col items-center gap-md">
<div class="flex gap-xs items-center">
<!-- Dot 1 (Active) -->
<div class="w-8 h-2 rounded-full bg-primary transition-all duration-500"></div>
<!-- Dot 2 -->
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<!-- Dot 3 -->
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<!-- Dot 4 -->
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
</footer>
</main>
<!-- Micro-interaction Scripts -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.querySelector('button');
            button.addEventListener('mouseenter', () => {
                // Subtle lift handled by Tailwind classes, but can add JS effects here
            });
            
            // Fade-in entry animation
            const mainContent = document.querySelector('main');
            mainContent.style.opacity = '0';
            mainContent.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                mainContent.style.transition = 'all 0.8s ease-out';
                mainContent.style.opacity = '1';
                mainContent.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
