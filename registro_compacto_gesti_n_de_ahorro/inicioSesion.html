<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<link rel="icon" type="image/x-icon" href="../img/favicon.ico"/>
<link rel="stylesheet" href="../css/brand.css"/>
<link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32.png"/>
<link rel="apple-touch-icon" href="../img/apple-touch-icon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro - iMoney</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="../js/tailwind-auth.js"></script>
<style>
        body {
            background-color: #f7f9fb;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 1);
            box-shadow: 0px 4px 20px rgba(15, 23, 42, 0.05);
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #565e74;
            box-shadow: 0 0 0 3px rgba(86, 94, 116, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen p-container-margin">
<main class="w-full max-w-[400px] flex flex-col items-center">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-xl">
    <img src="../img/logo.png" alt="iMoney" class="w-14 h-14 mb-md object-contain">

    <h1 class="brand-name font-headline-md text-headline-md text-primary tracking-tight"><span class="brand-i">i</span>Money</h1>
</div>
<!-- Registration Container -->
<div class="w-full glass-card rounded-xl p-lg md:p-xl">
<div class="mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Crea tu cuenta</h2>
<p class="font-body-md text-body-md text-secondary">Empieza a gestionar tus ahorros hoy mismo.</p>
</div>
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="name">NOMBRE COMPLETO</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">person</span>
<input class="w-full pl-10 pr-md py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline input-focus-ring transition-all" id="name" placeholder="Ej. Juan Pérez" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="email">CORREO ELECTRÓNICO</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
<input class="w-full pl-10 pr-md py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline input-focus-ring transition-all" id="email" placeholder="nombre@ejemplo.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-xs" for="password">CONTRASEÑA</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline input-focus-ring transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3.5 rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-lg" type="submit">
                    Registrarse
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative py-md flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-outline">O</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Sign-up -->
<button class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md py-3 rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-md" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continuar con Google
                </button>
</form>
</div>
<!-- Footer Link -->
<div class="mt-xl text-center">
<a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors inline-flex items-center gap-xs" href="#">
                ¿Ya tienes cuenta? 
                <span class="text-on-tertiary-container font-semibold">Inicia Sesión</span>
</a>
</div>
</main>
<!-- Success Message Overlay (Hidden by default) -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 bg-surface-container-highest border border-on-tertiary-container px-lg py-md rounded-xl shadow-lg flex items-center gap-md transform translate-y-24 opacity-0 transition-all duration-300 z-50" id="success-toast">
<span class="material-symbols-outlined text-on-tertiary-container">check_circle</span>
<span class="font-label-md text-label-md text-on-surface">¡Cuenta creada con éxito! Redirigiendo...</span>
</div>
<script src="../js/api.js"></script>
<script>
        const DASHBOARD = '../index.html';
        const LOGIN = '../login_compacto_gesti_n_de_ahorro/inicioSesion.html';

        // Visibilidad de contrasena (el primer button[type=button] es el toggle).
        const toggleBtn = document.querySelector('button[type="button"]');
        const passwordInput = document.getElementById('password');
        toggleBtn?.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            toggleBtn.querySelector('span').textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Enlace a "Inicia Sesión".
        document.querySelectorAll('a').forEach((a) => {
            if (/inicia sesión/i.test(a.textContent)) a.setAttribute('href', LOGIN);
        });

        // Registro real contra el API.
        const form = document.querySelector('form');
        const toast = document.getElementById('success-toast');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Procesando...';
            try {
                await API.register(
                    document.getElementById('name').value.trim(),
                    document.getElementById('email').value.trim(),
                    document.getElementById('password').value
                );
                toast.classList.remove('translate-y-24', 'opacity-0');
                btn.innerHTML = '<span class="material-symbols-outlined">check</span> Listo';
                setTimeout(() => { window.location.href = DASHBOARD; }, 1200);
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.innerHTML = originalContent;
            }
        });

        // "Continuar con Google" (el button[type=button] que dice Google).
        const googleBtn = Array.from(document.querySelectorAll('button[type="button"]'))
            .find((b) => /google/i.test(b.textContent));
        googleBtn?.addEventListener('click', async () => {
            const email = prompt('Correo de Google para continuar:');
            if (!email) return;
            try {
                await API.google(email.trim(), document.getElementById('name').value.trim() || 'Usuario Google');
                window.location.href = DASHBOARD;
            } catch (err) { alert(err.message); }
        });
    </script>
</body></html>
