        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-background dark:bg-background z-40">
<div class="flex justify-between items-center px-margin-mobile py-sm w-full">
<div class="flex items-center gap-3">
<img src="../img/logo.png" alt="iMoney" class="w-10 h-10 rounded-xl shadow-sm object-contain"/>
<span class="brand-name font-display text-display text-primary dark:text-primary-fixed-dim tracking-tight text-[20px] leading-tight"><span class="brand-i">i</span>Money</span>
</div>
<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim p-2 hover:bg-surface-container-low transition-colors rounded-full active:scale-95 duration-200">
                notifications
            </button>
</div>
</header>
<main class="px-margin-mobile pt-4 max-w-2xl mx-auto">
<!-- Section Title & Search -->
<div class="flex justify-between items-end mb-6">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Historial</h1>
<button class="material-symbols-outlined text-outline p-2 rounded-full hover:bg-surface-container transition-colors">
                search
            </button>
</div>
<!-- Quick Filters -->
<div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
<button class="px-6 py-2.5 rounded-full font-label-md text-label-md active-filter transition-all active:scale-95" id="filter-all" onclick="filterType('Todos')">
                Todos
            </button>
<button class="px-6 py-2.5 rounded-full font-label-md text-label-md bg-surface-container-lowest text-outline border border-outline-variant hover:border-primary transition-all active:scale-95" id="filter-expenses" onclick="filterType('Gastos')">
                Gastos
            </button>
<button class="px-6 py-2.5 rounded-full font-label-md text-label-md bg-surface-container-lowest text-outline border border-outline-variant hover:border-primary transition-all active:scale-95" id="filter-income" onclick="filterType('Ingresos')">
                Ingresos
            </button>
</div>
<!-- Lista de transacciones (poblada por JS, agrupada por fecha) -->
<div id="hist-list"></div>
<p id="hist-empty" class="hidden text-center text-outline py-10 font-label-md">Sin transacciones para este filtro.</p>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-surface-container-lowest dark:bg-inverse-surface z-50 rounded-t-xl shadow-xl">

<span class="material-symbols-outlined">dashboard</span>
<span class="font-label-sm text-label-sm mt-1">Panel</span>
</a>
<a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant p-3 hover:text-primary dark:hover:text-primary-fixed transition-all active:scale-90 duration-300 ease-out" href="../cartera/ingresoYGasto.html">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-label-sm text-label-sm mt-1">Cartera</span>
</a>
<a class="flex flex-col items-center justify-center bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-full px-4 py-1 transition-all active:scale-90 duration-300 ease-out shadow-lg" href="../historial_de_transacciones_finflow/historial.html">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">history</span>
<span class="font-label-sm text-label-sm mt-1">History</span>
</a>
<a class="flex flex-col items-center justify-center text-outline dark:text-outline-variant p-3 hover:text-primary dark:hover:text-primary-fixed transition-all active:scale-90 duration-300 ease-out" href="../ajustes_finflow/ajustes.html">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm mt-1">Ajustes</span>
</a>
</nav>
<script>
        function filterType(type) {
            const buttons = ['filter-all', 'filter-expenses', 'filter-income'];
            buttons.forEach(id => {
                const btn = document.getElementById(id);
                btn.classList.remove('active-filter');
                btn.classList.add('bg-surface-container-lowest', 'text-outline', 'border', 'border-outline-variant');
            });
            const activeBtn = document.getElementById(`filter-${type === 'Todos' ? 'all' : (type === 'Gastos' ? 'expenses' : 'income')}`);
            activeBtn.classList.add('active-filter');
            activeBtn.classList.remove('bg-surface-container-lowest', 'text-outline', 'border', 'border-outline-variant');
            // Recarga la lista con el filtro elegido.
            const tipo = type === 'Gastos' ? 'gasto' : type === 'Ingresos' ? 'ingreso' : '';
            cargarHistorial(tipo);
        }
    </script>
    <script src="../js/api.js?v=3"></script>
    <script src="../js/ui.js"></script>
    <script>
        API.requireSession('../login_compacto_gesti_n_de_ahorro/inicioSesion.html');

        function etiquetaFecha(iso) {
            const d = new Date(iso); const hoy = new Date();
            if (d.toDateString() === hoy.toDateString()) return 'Hoy';
            if (new Date(hoy.getTime() - 86400000).toDateString() === d.toDateString()) return 'Ayer';
            return d.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
        }
        const hora = (iso) => new Date(iso).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });

        function itemHTML(t) {
            const ingreso = t.tipo === 'ingreso';
            const signo = ingreso ? '+ ' : '- ';
            const colorMonto = ingreso ? 'text-primary' : 'text-on-surface-variant';
            return (
              '<div class="group flex items-center justify-between p-4 bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(37,99,235,0.03)] transition-all duration-300">' +
              '<div class="flex items-center gap-4">' +
              '<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary">' +
              '<span class="material-symbols-outlined">' + (ICONO_CAT[t.categoria] || 'payments') + '</span>' +
              '</div><div>' +
              '<p class="font-headline-md text-headline-md text-on-surface text-[16px]">' + esc(t.descripcion) + '</p>' +
              '<p class="font-label-sm text-label-sm text-outline">' + hora(t.fecha) + ' • ' + esc(t.categoria) + '</p>' +
              '</div></div>' +
              '<p class="font-headline-md text-headline-md ' + colorMonto + '">' + signo + API.fmt(t.monto) + '</p>' +
              '</div>'
            );
        }

        async function cargarHistorial(tipo) {
            tipo = tipo || '';
            const cont = document.getElementById('hist-list');
            const vacio = document.getElementById('hist-empty');
            try {
                const lista = await API.listTransacciones(tipo ? '?tipo=' + tipo : '');
                if (!lista.length) { cont.innerHTML = ''; vacio.classList.remove('hidden'); return; }
                vacio.classList.add('hidden');
                const grupos = [];
                for (const t of lista) {
                    const k = etiquetaFecha(t.fecha);
                    let g = grupos.find((x) => x.k === k);
                    if (!g) { g = { k, items: [] }; grupos.push(g); }
                    g.items.push(t);
                }
                cont.innerHTML = grupos.map((g) =>
                  '<section class="mb-8">' +
                  '<div class="flex items-center gap-4 mb-4">' +
                  '<h2 class="font-label-md text-label-md text-outline uppercase tracking-wider">' + esc(g.k) + '</h2>' +
                  '<div class="h-[1px] flex-grow bg-outline-variant/30"></div>' +
                  '</div>' +
                  '<div class="space-y-4">' + g.items.map(itemHTML).join('') + '</div>' +
                  '</section>'
                ).join('');
            } catch (err) {
                const p = document.createElement('p');
                p.className = 'text-center text-error py-10';
                p.textContent = err.message;
                cont.replaceChildren(p);
            }
        }

        cargarHistorial();
    </script>
</body></html>
