<script>
        // Simple Confetti Micro-interaction
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height - canvas.height;
                this.size = Math.random() * 8 + 4;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 + 2;
                this.color = `hsl(${Math.random() * 360}, 70%, 60%)`;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 5;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) {
                    this.y = -20;
                    this.x = Math.random() * canvas.width;
                }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                ctx.restore();
            }
        }

        function init() {
            for (let i = 0; i < 40; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();

        // Slow down and stop after a few seconds
        setTimeout(() => {
            particles = [];
        }, 5000);
    </script>
    <script>
        const DASHBOARD = '../index.html';
        const HISTORIAL = '../historial_de_transacciones_finflow/historial.html';

        // Rellenar tarjeta con el ingreso recién guardado.
        const fmt = (n) => '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2 });
        try {
            const tx = JSON.parse(sessionStorage.getItem('finflow_ultimo_ingreso'));
            if (tx) {
                document.getElementById('ci-monto').textContent = fmt(tx.monto);
                document.getElementById('ci-desc').textContent = tx.descripcion || tx.categoria || '—';
                document.getElementById('ci-tipo').textContent = tx.categoria || 'Ingreso';
                document.getElementById('ci-fecha').textContent =
                    new Date(tx.fecha || tx.creado_en || Date.now())
                        .toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
            }
        } catch { /* sin datos */ }

        // Navegación de los botones de confirmación.
        document.querySelectorAll('button').forEach((b) => {
            if (/volver al inicio/i.test(b.textContent)) b.onclick = () => (window.location.href = DASHBOARD);
            if (/ver detalles/i.test(b.textContent)) b.onclick = () => (window.location.href = HISTORIAL);
        });
    </script>
