<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<link rel="icon" type="image/x-icon" href="../img/favicon.ico"/>
<link rel="stylesheet" href="../css/brand.css"/>
<link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32.png"/>
<link rel="apple-touch-icon" href="../img/apple-touch-icon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="../js/tailwind-app.js"></script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bottom-sheet-transition {
            transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .recurring-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }
        .recurring-active .recurring-content {
            max-height: 200px;
            opacity: 1;
        }
        input:focus {
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim flex items-end justify-center min-h-screen overflow-hidden">
<!-- Backdrop overlay -->
<div class="fixed inset-0 bg-inverse-surface/20 backdrop-blur-sm z-10 transition-opacity duration-300" id="backdrop"></div>
<!-- Bottom Sheet Container -->
<div class="relative z-20 w-full max-w-md bg-surface-container-lowest rounded-t-[32px] bottom-sheet-transition shadow-[0_-8px_40px_rgba(0,0,0,0.12)] p-gutter pb-xl transform translate-y-0" id="bottomSheet">
<!-- Handle -->
<div class="flex justify-center mb-base">
<div class="w-10 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="flex items-center justify-between mb-gutter">
<h2 class="font-headline-md text-headline-md text-on-surface">Agregar Ingreso</h2>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-variant transition-colors" onclick="closeSheet()">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Form Content -->
<div class="space-y-gutter">
<!-- Amount Input Section -->
<div class="text-center py-base">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-xs block">Monto total</label>
<div class="flex items-center justify-center text-primary">
<span class="font-display text-display mr-1">$</span>
<input id="i-monto" autofocus="" class="w-full bg-transparent border-none text-center font-display text-display p-0 placeholder-primary/20 focus:ring-0 focus:outline-none" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Description Input -->
<div>
<label class="font-label-md text-label-md text-on-surface mb-base block">Descripción</label>
<div class="bg-surface-container-low rounded-xl px-md py-sm flex items-center group focus-within:ring-2 focus-within:ring-primary focus-within:bg-white transition-all">
<span class="material-symbols-outlined text-on-surface-variant mr-sm">edit_note</span>
<input id="i-desc" class="w-full bg-transparent border-none p-0 font-body-md text-body-md text-on-surface placeholder-on-surface-variant focus:ring-0" placeholder="Sueldo mensual" type="text"/>
</div>
</div>
<!-- Recurring Toggle -->
<div class="p-md bg-surface-container-low rounded-2xl transition-all" id="recurringSection">
<div class="flex items-center justify-between">
<div class="flex items-center space-x-sm">
<div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">event_repeat</span>
</div>
<span class="font-label-md text-label-md text-on-surface">Anclar como ingreso recurrente</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" id="recurringToggle" onchange="toggleRecurring()" type="checkbox"/>
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Recurring Options (Segmented Control) -->
<div class="recurring-content">
<div class="mt-gutter grid grid-cols-2 gap-sm p-1 bg-surface-container-high rounded-xl">
<button class="py-sm rounded-lg font-label-md text-label-md transition-all bg-white text-primary shadow-sm" id="btnWeekly" onclick="selectFrequency('Weekly')">Semanal</button>
<button class="py-sm rounded-lg font-label-md text-label-md transition-all text-on-surface-variant hover:text-on-surface" id="btnBiweekly" onclick="selectFrequency('Biweekly')">Quincenal</button>
</div>
</div>
</div>
<!-- Primary Action -->
<div class="pt-gutter">
<button id="i-submit" type="button" class="w-full py-md bg-primary text-on-primary font-headline-md text-headline-md rounded-2xl shadow-[0_8px_20px_rgba(0,74,198,0.25)] active:scale-[0.98] transition-all hover:opacity-90 flex items-center justify-center space-x-base">
<span>Anadir Ingreso</span>
<span class="material-symbols-outlined">arrow_forward</span>

</button>
<p class="text-center font-label-sm text-label-sm text-on-surface-variant mt-md">El ingreso se sumará a tu saldo disponible inmediatamente.</p>
</div>
</div>
</div>
<!-- Background Mockup Illustration (Simulating Screen 3) -->
<div class="absolute inset-0 -z-0 p-gutter overflow-hidden flex flex-col space-y-gutter opacity-40">
<div class="w-full h-48 bg-primary-container rounded-3xl"></div>
<div class="grid grid-cols-2 gap-gutter">
<div class="h-32 bg-white rounded-3xl shadow-sm"></div>
<div class="h-32 bg-white rounded-3xl shadow-sm"></div>
</div>
<div class="space-y-base">
<div class="h-16 bg-white rounded-2xl"></div>
<div class="h-16 bg-white rounded-2xl"></div>
<div class="h-16 bg-white rounded-2xl"></div>
</div>
</div>
<script>
        function toggleRecurring() {
            const section = document.getElementById('recurringSection');
            const toggle = document.getElementById('recurringToggle');
            
            if (toggle.checked) {
                section.classList.add('recurring-active');
                section.classList.remove('bg-surface-container-low');
                section.classList.add('bg-tertiary-container/5', 'ring-1', 'ring-tertiary/10');
            } else {
                section.classList.remove('recurring-active');
                section.classList.add('bg-surface-container-low');
                section.classList.remove('bg-tertiary-container/5', 'ring-1', 'ring-tertiary/10');
            }
        }

        // Frecuencia seleccionada (en espanol, como la espera el API).
        let frecuenciaSel = 'semanal';

        function selectFrequency(type) {
            frecuenciaSel = type === 'Weekly' ? 'semanal' : 'quincenal';
            const weekly = document.getElementById('btnWeekly');
            const biweekly = document.getElementById('btnBiweekly');

            if (type === 'Weekly') {
                weekly.classList.add('bg-white', 'text-primary', 'shadow-sm');
                weekly.classList.remove('text-on-surface-variant');
                biweekly.classList.remove('bg-white', 'text-primary', 'shadow-sm');
                biweekly.classList.add('text-on-surface-variant');
            } else {
                biweekly.classList.add('bg-white', 'text-primary', 'shadow-sm');
                biweekly.classList.remove('text-on-surface-variant');
                weekly.classList.remove('bg-white', 'text-primary', 'shadow-sm');
                weekly.classList.add('text-on-surface-variant');
            }
        }

        function closeSheet() {
            const sheet = document.getElementById('bottomSheet');
            const backdrop = document.getElementById('backdrop');
            sheet.style.transform = 'translateY(100%)';
            backdrop.style.opacity = '0';
            setTimeout(() => {
                // In a real app, this would route back or hide the component
                sheet.style.transform = 'translateY(0)';
                backdrop.style.opacity = '1';
            }, 1000);
        }

        // Micro-interaction for amount input
        const amountInput = document.getElementById('i-monto');
        amountInput.addEventListener('input', (e) => {
            const val = e.target.value;
            amountInput.style.fontSize = val.length > 5 ? '36px' : '48px';
        });
    </script>
    <script src="../js/api.js"></script>
    <script>
        const DASHBOARD = '../index.html';
        API.requireSession('../login_compacto_gesti_n_de_ahorro/inicioSesion.html');

        // "Cerrar" vuelve al dashboard (sobreescribe la animación demo).
        window.closeSheet = () => (window.location.href = DASHBOARD);

        document.getElementById('i-submit').addEventListener('click', async () => {
            const monto = parseFloat(document.getElementById('i-monto').value);
            if (!monto || monto <= 0) { alert('Ingresa un monto válido'); return; }
            const recurrente = document.getElementById('recurringToggle').checked;
            const tx = {
                tipo: 'ingreso',
                monto,
                descripcion: document.getElementById('i-desc').value.trim() || 'Ingreso',
                categoria: 'Nómina',
                recurrente,
                frecuencia: recurrente ? frecuenciaSel : 'mensual',
            };
            try {
                const creada = await API.crearTransaccion(tx);
                sessionStorage.setItem('finflow_ultimo_ingreso', JSON.stringify(creada));
                window.location.href = 'ingresoCorrecto.html';
            } catch (err) {
                alert('No se pudo guardar: ' + err.message);
            }
        });
    </script>
</body></html>
