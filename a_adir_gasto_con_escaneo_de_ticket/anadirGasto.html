<!DOCTYPE html><html lang="es" style=""><head>
<meta charset="utf-8">
<link rel="icon" type="image/x-icon" href="../img/favicon.ico"/>
<link rel="stylesheet" href="../css/brand.css"/>
<link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32.png"/>
<link rel="apple-touch-icon" href="../img/apple-touch-icon.png"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>iMoney - Anadir Gasto</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="../js/tailwind-app.js"></script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .modal-enter {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .modal-exit {
          animation: slideDown 0.35s cubic-bezier(0.7, 0, 0.84, 0) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes slideDown {
          from { transform: translateY(0); }
          to { transform: translateY(100%); }
        }
        .chip-active {
            background-color: #2563eb;
            color: white;
        }
        .dim-overlay {
            background: rgba(25, 28, 30, 0.6);
            backdrop-filter: blur(4px);
        }
        .dim-overlay-transition {
          transition: opacity 0.25s ease;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- Background Screen Simulation (Dimmed Dashboard) -->
<div class="fixed inset-0 w-full h-full pointer-events-none">
<iframe src="../index.html" title="Fondo index" class="w-full h-full border-0"></iframe>
<div id="backgroundDim" class="absolute inset-0 dim-overlay dim-overlay-transition"></div>
</div>
<!-- Main Mobile Container -->
<div class="relative z-10 w-full max-w-md h-screen flex flex-col justify-end">
<!-- Bottom Sheet Modal -->
<div id="expenseModal" class="modal-enter bg-surface-container-lowest rounded-t-[32px] w-full p-gutter flex flex-col space-y-lg shadow-[0_-8px_40px_rgba(0,0,0,0.12)]">
<!-- Handle -->
<div class="w-12 h-1.5 bg-surface-variant rounded-full mx-auto -mt-2 mb-6"></div>
<!-- Title & Close -->
<div class="flex justify-between items-center">
<h1 class="font-headline-md text-headline-md text-on-surface">Anadir Gasto</h1>
<button type="button" onclick="closeModal()" class="p-2 rounded-full hover:bg-surface-container-high active:scale-90 transition-all">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div><div class="flex flex-col space-y-md">
<div class="flex flex-col items-center space-y-xs">
<span class="text-label-md text-on-surface-variant">Importe</span>
<div class="flex items-baseline">
<span class="text-display text-primary">$</span>
<input id="g-monto" autofocus="" class="w-full text-center text-display bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-surface-variant" placeholder="0.00" type="number">
<button id="g-scan" type="button" class="ml-2 p-2 rounded-full bg-surface-container-high text-primary hover:bg-secondary hover:text-on-primary transition-all active:scale-90 flex items-center gap-1" title="Escanear Ticket">
<span class="material-symbols-outlined">document_scanner</span>
<span class="text-label-sm">Escanear</span>
</button>
<input id="g-file" type="file" accept="image/*" capture="environment" class="hidden"></div>
</div>
<div class="flex flex-col space-y-xs">
<label class="text-label-md text-on-surface-variant ml-1">Descripción</label>
<input id="g-desc" class="w-full p-4 rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary text-body-lg text-on-surface" placeholder="¿En qué gastaste?" type="text">
<div id="g-cat-badge" class="hidden flex items-center gap-1 mt-1 ml-1">
  <span class="material-symbols-outlined text-primary" style="font-size:16px">auto_awesome</span>
  <span class="text-label-sm text-primary" id="g-cat-label"></span>
</div>
</div><div class="flex flex-col space-y-xs">
  <label class="text-label-md text-on-surface-variant ml-1">Método de Pago</label>
  <div class="flex gap-2">
    <button onclick="toggleChip(this)" class="chip-active flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-primary text-on-primary transition-all active:scale-[0.98]">
      <span class="material-symbols-outlined">payments</span>
      <span class="text-label-md">Efectivo</span>
    </button>
    <button onclick="toggleChip(this)" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-xl bg-surface-container-low text-on-surface-variant transition-all active:scale-[0.98] hover:bg-surface-container-high">
      <span class="material-symbols-outlined">credit_card</span>
      <span class="text-label-md">Tarjeta</span>
    </button>
  </div>
</div>
</div>
<button id="g-submit" type="button" class="w-full py-4 bg-primary text-on-primary rounded-full font-label-md text-label-md shadow-lg active:scale-[0.98] transition-all hover:bg-secondary">
  Anadir Gasto
</button>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
    function closeModal() {
      const modal = document.getElementById('expenseModal');
      const dim = document.getElementById('backgroundDim');
      modal.classList.remove('modal-enter');
      modal.classList.add('modal-exit');
      if (dim) { dim.style.opacity = '0'; }
      setTimeout(() => { window.location.href = '../index.html'; }, 360);
    }

    function toggleChip(button) {
        const container = button.parentElement;
        const buttons = container.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.classList.remove('chip-active', 'bg-primary');
            btn.classList.add('bg-surface-container-low', 'text-on-surface-variant');
        });
        button.classList.add('chip-active');
        button.classList.remove('bg-surface-container-low', 'text-on-surface-variant');
    }

    window.addEventListener('DOMContentLoaded', () => {
        const amountInput = document.getElementById('g-monto');
        if (amountInput) {
            amountInput.focus();
            amountInput.addEventListener('focus', () => { setTimeout(() => amountInput.select(), 10); });
        }
    });

</script>
<script src="../js/api.js"></script>
<script>
    const LOGIN = '../login_compacto_gesti_n_de_ahorro/inicioSesion.html';
    API.requireSession(LOGIN);

    let categoriaDetectada = 'Otros';

    // Clasificador de categoría por palabras clave en la descripción
    const KEYWORDS_CAT = {
        'Comida':          ['taco','tacos','comida','restaurante','pizza','burger','pollo','sushi','café','cafe','panaderia','tortilleria','oxxo','seven','7-eleven','dominos','wendys','mcdonalds','kfc','starbucks','bimbo','soriana','chedraui','mercado','fondita','torta','tamales'],
        'Transporte':      ['uber','didi','taxi','gasolina','gas','autobus','camion','metro','transporte','caseta','estacionamiento','escuela','bici','moto','lyft','cabify'],
        'Compras':         ['amazon','walmart','liverpool','coppel','sears','mercado libre','tienda','ropa','zapatos','shein','zara','h&m','costco','sam\'s','sams'],
        'Servicios':       ['luz','cfe','agua','internet','telmex','telcel','movistar','at&t','telefono','cable','izzi','totalplay','factura','recibo','plan'],
        'Salud':           ['farmacia','doctor','medicina','hospital','medico','dentista','benavides','similares','gym','gimnasio','consulta','pastillas','vitaminas'],
        'Entretenimiento': ['netflix','spotify','disney','cine','cinema','hbo','youtube','twitch','juego','videojuego','prime','apple tv','crunchyroll','dazn'],
        'Vivienda':        ['renta','departamento','casa','mantenimiento','plomero','electricista','pintura','muebles','ikea'],
        'Ocio':            ['bar','antro','discoteca','cerveza','bebida','vino','mezcal','tequila','fiesta','copa'],
        'Nómina':          ['sueldo','nomina','salario','pago empresa','transferencia','deposito'],
    };

    function clasificarPorDescripcion(desc) {
        const lower = (desc || '').toLowerCase();
        for (const [cat, words] of Object.entries(KEYWORDS_CAT)) {
            if (words.some(w => lower.includes(w))) return cat;
        }
        return 'Otros';
    }

    // Engancha el clasificador al campo de descripción
    (function () {
        const descInput = document.getElementById('g-desc');
        const badge = document.getElementById('g-cat-badge');
        const label = document.getElementById('g-cat-label');
        if (!descInput) return;
        descInput.addEventListener('input', () => {
            const cat = clasificarPorDescripcion(descInput.value);
            categoriaDetectada = cat;
            if (cat !== 'Otros' && descInput.value.trim()) {
                label.textContent = cat;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        });
    })();

    function metodoPago() {
        const activo = document.querySelector('.chip-active .text-label-md');
        return activo ? activo.textContent.trim() : 'Efectivo';
    }

    const fileInput = document.getElementById('g-file');
    const scanBtn = document.getElementById('g-scan');
    scanBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async () => {
        const file = fileInput.files[0];
        if (!file) return;
        const original = scanBtn.innerHTML;
        scanBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span>';
        try {
            const base64 = await new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = () => resolve(String(r.result).split(',')[1]);
                r.onerror = reject;
                r.readAsDataURL(file);
            });
            const t = await API.leerTicket(base64, file.type);
            if (t.total) document.getElementById('g-monto').value = t.total;
            if (t.comercio) {
                document.getElementById('g-desc').value = t.comercio;
                document.getElementById('g-desc').dispatchEvent(new Event('input'));
            }
            if (t.categoria) {
                categoriaDetectada = t.categoria;
                const label = document.getElementById('g-cat-label');
                const badge = document.getElementById('g-cat-badge');
                if (label && badge) { label.textContent = t.categoria; badge.classList.remove('hidden'); }
            }
        } catch (err) {
            alert('No se pudo leer el ticket: ' + err.message);
        } finally {
            scanBtn.innerHTML = original;
        }
    });

    document.getElementById('g-submit').addEventListener('click', async () => {
        const monto = parseFloat(document.getElementById('g-monto').value);
        if (!monto || monto <= 0) { alert('Ingresa un importe válido'); return; }
        const tx = {
            tipo: 'gasto',
            monto,
            descripcion: document.getElementById('g-desc').value.trim() || 'Gasto',
            categoria: categoriaDetectada,
            metodo_pago: metodoPago(),
        };
        try {
            const creada = await API.crearTransaccion(tx);
            sessionStorage.setItem('finflow_ultimo_gasto', JSON.stringify(creada));
            window.location.href = 'gastoCompletado.html';
        } catch (err) {
            alert('No se pudo guardar: ' + err.message);
        }
    });
</script>
</body></html>
