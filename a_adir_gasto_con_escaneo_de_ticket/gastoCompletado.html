<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
            color: #191c1e;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .success-pulse {
            animation: pulse-ring 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center">
<!-- Top App Bar (Suppressing global nav per transactional context) -->
<header class="w-full top-0 sticky bg-background flex items-center justify-between px-margin-mobile py-sm z-50">
<button type="button" onclick="window.location.href='../index.html'" class="hover:opacity-80 transition-opacity scale-95 active:transition-all">
<span class="material-symbols-outlined text-primary text-headline-md">close</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Confirmación</h1>
<div class="w-8"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-grow flex flex-col items-center justify-center w-full px-margin-mobile pt-sm pb-xl max-w-md">
<!-- Success State Indicator -->
<div class="relative mb-lg">
<div class="absolute inset-0 bg-tertiary-fixed-dim rounded-full success-pulse"></div>
<div class="relative bg-white shadow-xl rounded-full p-6 flex items-center justify-center">
<span class="material-symbols-outlined text-[64px] text-tertiary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<div class="text-center mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">Gasto Registrado</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Tu registro se ha guardado correctamente</p>
</div>
<!-- Expense Details Card -->
<div class="w-full bg-surface-container-lowest shadow-[0_20px_40px_rgba(37,99,235,0.05)] rounded-xl p-md flex flex-col gap-md mb-xl" style="opacity: 1; transform: translateY(0px); transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1);">
<div class="flex items-center justify-between border-b border-outline-variant pb-md">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">Monto</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary" id="c-monto">$0.00</span>
</div>
<div class="bg-primary-fixed text-on-primary-fixed-variant px-sm py-xs rounded-full font-label-md text-label-md" id="c-desc">
                    —
                </div>
</div>
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col gap-xs">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Fecha</span>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">calendar_today</span>
<span class="font-label-md text-label-md text-on-surface" id="c-fecha">—</span>
</div>
</div>
<div class="flex flex-col gap-xs">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Categoría</span>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">restaurant</span>
<span class="font-label-md text-label-md text-on-surface" id="c-categoria">—</span>
</div>
</div>
</div>
<div class="flex flex-col gap-xs pt-xs">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Método de Pago</span>
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-on-surface-variant text-[18px]">credit_card</span>
<span class="font-label-md text-label-md text-on-surface" id="c-metodo">—</span>
</div>
</div>
</div>
<!-- Bottom Action Buttons -->
<div class="w-full flex flex-col gap-sm">
<button type="button" onclick="window.location.href='../index.html'" class="w-full py-md bg-primary-container text-on-primary font-label-md text-label-md rounded-xl shadow-lg hover:opacity-90 active:scale-95 transition-all">
                Volver al Inicio
            </button>
<button class="w-full py-md bg-surface-container-high text-primary font-label-md text-label-md rounded-xl hover:bg-surface-container-highest active:scale-95 transition-all">
                Ver Historial
            </button>
</div>
</main>
<!-- Contextual Illustration/Visual Element -->

<script>
        // Micro-interaction for the card lift effect on mount
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.bg-surface-container-lowest');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);

            // Rellena la tarjeta con la transacción recién creada.
            const DASHBOARD = '../index.html';
            const HISTORIAL = '../historial_de_transacciones_finflow/historial.html';
            const fmt = (n) => '$' + Number(n || 0).toLocaleString('es-MX', { minimumFractionDigits: 2 });
            try {
                const tx = JSON.parse(sessionStorage.getItem('finflow_ultimo_gasto'));
                if (tx) {
                    document.getElementById('c-monto').textContent = fmt(tx.monto);
                    document.getElementById('c-desc').textContent = tx.descripcion || tx.categoria;
                    document.getElementById('c-categoria').textContent = tx.categoria;
                    document.getElementById('c-metodo').textContent = tx.metodo_pago || '—';
                    document.getElementById('c-fecha').textContent =
                        new Date(tx.fecha).toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: 'numeric' });
                }
            } catch { /* sin datos */ }

            // Navegación: "Volver al Inicio" → dashboard; "Ver Historial" → historial.
            document.querySelectorAll('button').forEach((b) => {
                if (/volver al inicio/i.test(b.textContent)) b.onclick = () => (window.location.href = DASHBOARD);
                if (/ver historial/i.test(b.textContent)) b.onclick = () => (window.location.href = HISTORIAL);
            });
        });
    </script>


</body></html>
