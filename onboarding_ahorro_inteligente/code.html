<style>

        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;

<!-- Bottom Navigation Shell (Suppressed for Onboarding Flow per PRD) -->
<script>
        // Micro-interaction for the button
        const nextBtn = document.querySelector('button.bg-primary-container');
        nextBtn.addEventListener('click', () => {
            nextBtn.classList.add('scale-95');
            setTimeout(() => {
                nextBtn.classList.remove('scale-95');
            }, 100);
        });

        // Atmospheric background pulse logic
        const bgElements = document.querySelectorAll('.canvas-bg div');
        window.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX / window.innerWidth - 0.5) * 20;
            const moveY = (e.clientY / window.innerHeight - 0.5) * 20;
            bgElements.forEach(el => {
                el.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
