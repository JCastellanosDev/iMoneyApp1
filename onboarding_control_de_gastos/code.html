<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
            color: #191c1e;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pagination-dot {
            transition: all 0.3s ease;
        }
        .active-dot {
            width: 24px;
            border-radius: 9999px;
        }
        .illustration-container {
            perspective: 1000px;
        }
        .floating-card {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }

<body class="flex flex-col min-h-screen bg-background">
<!-- Top AppBar Component -->
<header class="w-full top-0 flex justify-between items-center px-margin-mobile py-4 w-full bg-background transition-opacity duration-200">
<button aria-label="Regresar" class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<button class="font-label-md text-label-md text-on-surface-variant hover:opacity-80 transition-opacity duration-200">
            Skip
        </button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile max-w-xl mx-auto w-full">
<!-- Central Illustration Container -->
<div class="relative w-full aspect-square max-w-[400px] mb-lg illustration-container">
<div class="absolute inset-0 bg-primary-container/5 rounded-full blur-3xl scale-90"></div>
<div class="relative z-10 w-full h-full flex items-center justify-center floating-card">

</div>
</div>
<!-- Text Content Section -->
<div class="text-center space-y-sm mb-xl">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface">
                Registra tus Gastos
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant px-4">
                Escanea tus tickets y visualiza tus consumos al instante con gráficos claros.
            </p>
</div>
</main>
<!-- Bottom Navigation & Controls -->
<footer class="w-full px-margin-mobile pb-xl flex flex-col items-center gap-lg">
<!-- Pagination Dots -->
<div class="flex items-center gap-xs">
<div class="pagination-dot w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="pagination-dot active-dot h-2 bg-primary"></div>
<div class="pagination-dot w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="pagination-dot w-2 h-2 rounded-full bg-outline-variant"></div>
</div>
<!-- Action Button -->
<div class="w-full max-w-sm">
<button class="w-full py-4 bg-primary text-on-primary font-label-md text-body-lg rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-200">
                Siguiente
            </button>
</div>
</footer>
<!-- Micro-interaction Script -->
<script>
        document.querySelector('button.bg-primary').addEventListener('mousedown', function() {
            this.classList.add('brightness-90');
        });
        document.querySelector('button.bg-primary').addEventListener('mouseup', function() {
            this.classList.remove('brightness-90');
        });
        
        // Simple entry animation
        window.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('h1, p, img, button');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(10px)';
                el.style.transition = 'opacity 0.6s ease-out, transform 0.6s ease-out';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, index * 100);
            });
        });
    </script>
