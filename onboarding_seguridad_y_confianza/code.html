        }

            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- Top Navigation Bar (Simplified for Onboarding) -->
<header class="flex justify-between items-center px-margin-mobile py-4 w-full bg-background">
<div class="flex items-center">
<span class="material-symbols-outlined text-primary cursor-pointer transition-opacity duration-200 hover:opacity-80" data-icon="arrow_back">arrow_back</span>
</div>
<div class="font-headline-md text-headline-md font-bold text-primary"></div>
<button class="font-label-md text-label-md text-on-surface-variant transition-opacity duration-200 hover:opacity-80">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-lg text-center">
<!-- Illustration Section -->
<div class="relative w-full max-w-sm mb-xl fade-in" style="animation-delay: 0.1s;">
<div class="absolute inset-0 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
<img alt="Security Illustration" class="w-full h-auto object-contain mx-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuARZAGKsC3l7RzDphSf9JthMa4wtGq4MALinSy6fdfj4IPbXicoPhbkdHvTVF3njFKxGMOinjajOm6OrQ30_KMeYyosnLS85bDefzLDBh7m7VwRfg9Va3ihzikDIhh_QwacId9bUr5M4E62WY_Y4k7_ZT18qbZ-flh2g0NbejXvl8lbkJ19vifn-dC7BpvPh1OcJnJRq6rAOEWPKLrS24BFvm_IPcueVgwWh5UscNXr7AmSXXAAwX7RCUvlgHj0fDL7baDzjrcjDYU"/>
</div>
<!-- Text Content -->
<div class="max-w-md w-full fade-in" style="animation-delay: 0.3s;">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background mb-sm md:font-headline-lg md:text-headline-lg">
                Seguridad Total
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant px-sm">
                Tus datos están protegidos con los más altos estándares de cifrado y seguridad biométrica.
            </p>
</div>
<!-- Security Badge Grid (Bento style hint) -->
<div class="grid grid-cols-2 gap-sm mt-lg w-full max-w-md fade-in" style="animation-delay: 0.5s;">
<div class="bg-surface-container-low p-sm rounded-xl flex items-center gap-sm">
<div class="bg-primary-fixed text-primary p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<div class="text-left">
<p class="font-label-sm text-label-sm text-on-surface">Cifrado AES-256</p>
</div>
</div>
<div class="bg-surface-container-low p-sm rounded-xl flex items-center gap-sm">
<div class="bg-tertiary-fixed text-tertiary p-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[20px]" data-icon="fingerprint">fingerprint</span>
</div>
<div class="text-left">
<p class="font-label-sm text-label-sm text-on-surface">Biometría</p>
</div>
</div>
</div>
</main>
<!-- Footer Controls -->
<footer class="w-full px-margin-mobile pb-xl pt-md bg-background flex flex-col items-center gap-lg">
<!-- Pagination Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant"></div>
<div class="w-6 h-2 rounded-full bg-primary transition-all duration-300"></div>
</div>
<!-- CTA Action -->
<div class="w-full max-w-md fade-in" style="animation-delay: 0.7s;">
<button class="w-full py-4 bg-primary text-on-primary font-label-md text-label-md rounded-xl transition-all duration-300 hover:opacity-90 active:scale-95 shadow-lg shadow-primary/20">
                Empezar ahora
            </button>
</div>
</footer>
<!-- Decorative Atmosphere Background (Subtle Gradient) -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-20 overflow-hidden">
<div class="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] bg-secondary/5 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-[10%] -left-[10%] w-[50%] h-[50%] bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
<script>
        // Simple micro-interaction for button press
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            this.classList.add('scale-95');
            setTimeout(() => {
                this.classList.remove('scale-95');
                // Potential navigation logic would go here
                console.log('Onboarding Complete - Redirecting...');
            }, 150);
        });
    </script>
