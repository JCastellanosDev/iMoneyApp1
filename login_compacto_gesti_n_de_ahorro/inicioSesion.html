<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <link rel="icon" type="image/x-icon" href="../img/favicon.ico"/>
    <link rel="stylesheet" href="../css/brand.css"/>
    <link rel="icon" type="image/png" sizes="32x32" href="../img/favicon-32.png"/>
    <link rel="apple-touch-icon" href="../img/apple-touch-icon.png"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>iMoney - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="../js/tailwind-auth.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fb;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus-within {
            border-color: #008cc7;
            box-shadow: 0 0 0 3px rgba(0, 140, 199, 0.1);
        }
        .elevation-soft {
            box-shadow: 0px 4px 20px rgba(15, 23, 42, 0.05);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

<header class="w-full top-0 left-0 flex items-center justify-center px-container-margin py-md">
    <div class="flex items-center gap-sm">
        <img src="../img/logo-sm.png" alt="iMoney" class="w-10 h-10 rounded-xl shadow-sm object-contain"/>
        <span class="brand-name font-headline-md text-headline-md font-bold text-primary tracking-tight"><span class="brand-i">i</span>Money</span>
    </div>
</header>

<main class="flex-grow flex flex-col items-center justify-center px-container-margin pb-md">
    <div class="w-full max-w-[400px] space-y-md">

        <div class="text-center space-y-sm">
            <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background">Bienvenido de nuevo</h1>
            <p class="font-body-md text-body-md text-secondary">Gestiona tus ahorros de forma inteligente.</p>
        </div>

        <div class="bg-surface-container-lowest border border-outline-variant rounded-xl elevation-soft space-y-md px-md py-md">
            <form class="space-y-sm" id="loginForm">

                <!-- Email Input -->
                <div class="space-y-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="email">Correo Electrónico</label>
                    <div class="relative flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm input-focus-ring transition-all">
                        <span class="material-symbols-outlined text-secondary mr-sm" data-icon="mail">mail</span>
                        <input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-background placeholder:text-outline" id="email" name="email" placeholder="ejemplo@email.com" required="" type="email"/>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="space-y-xs">
                    <label class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" for="password">Contrasena</label>
                    <div class="relative flex items-center bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm input-focus-ring transition-all">
                        <span class="material-symbols-outlined text-secondary mr-sm" data-icon="lock">lock</span>
                        <input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-background placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                        <button class="text-secondary hover:text-primary transition-colors" onclick="togglePassword()" type="button">
                            <span class="material-symbols-outlined" data-icon="visibility" id="passwordToggleIcon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Forgot Password -->
                <div class="flex justify-end">
                    <a class="font-label-sm text-label-sm text-on-tertiary-container hover:underline transition-all" href="#">Olvide mi contrasena</a>
                </div>

                <!-- Primary Action -->
                <button class="w-full bg-primary text-on-primary py-md rounded-full font-label-md text-label-md transition-transform active:scale-95 shadow-md flex items-center justify-center gap-sm" type="submit">
                    <span>Iniciar Sesión</span>
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
                </button>

                <!-- Google Action -->
                <button class="w-full bg-surface-container-lowest text-on-background border border-outline-variant py-md rounded-full font-label-md text-label-md transition-transform active:scale-95 shadow-md flex items-center justify-center gap-sm mt-sm" type="button">
                    <svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                    </svg>
                    <span>Continuar con Google</span>
                </button>
            </form>
        </div>

        <!-- Secondary Action -->
        <div class="text-center">
            <p class="font-body-md text-body-md text-secondary">
                ¿No tienes cuenta?
                <a class="text-on-tertiary-container font-semibold hover:underline" href="#">Regístrate</a>
            </p>
        </div>
    </div>
</main>

<footer class="flex flex-col items-center gap-sm w-full px-container-margin border-t border-outline-variant py-md">
    <div class="flex gap-md">
        <a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a>
        <a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Terms of Service</a>
        <a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Help Center</a>
    </div>
    <p class="font-label-sm text-label-sm text-secondary">© 2024 iMoney Inc. Secure &amp; Encrypted.</p>
</footer>

<script src="../js/api.js"></script>
<script>
    const DASHBOARD = '../index.html';
    const REGISTRO = '../registro_compacto_gesti_n_de_ahorro/inicioSesion.html';

    // Manejo de contrasena visible
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        const icon = document.getElementById('passwordToggleIcon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            icon.textContent = 'visibility';
        }
    }

    // Enlaces dinámicos a la pantalla de registro
    document.querySelectorAll('a').forEach((a) => {
        if (/regístrate/i.test(a.textContent)) a.setAttribute('href', REGISTRO);
    });

    // --- SIMULACIÓN DE INICIO DE SESIÓN INTEGRADA ---
    document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const btn = this.querySelector('button[type="submit"]');
        const originalContent = btn.innerHTML;

        // Animación de carga activa
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> <span>Accediendo...</span>';
        btn.disabled = true;
        btn.classList.add('opacity-80');

        // Espera controlada de 1 segundo para mejorar el UX
        setTimeout(() => {
            // Almacenamos credenciales temporales ficticias en el navegador
            localStorage.setItem('user_session', 'active');
            localStorage.setItem('user_email', document.getElementById('email').value.trim());

            // Redirección directa al archivo principal (Dashboard)
            window.location.href = DASHBOARD;
        }, 1000);
    });

    // --- SIMULACIÓN DE INICIO DE SESIÓN CON GOOGLE ---
    const googleBtn = Array.from(document.querySelectorAll('button[type="button"]'))
        .find((b) => /google/i.test(b.textContent));

    googleBtn?.addEventListener('click', () => {
        const email = prompt('Correo de Google para continuar:');
        if (!email) return;

        localStorage.setItem('user_session', 'active');
        localStorage.setItem('user_email', email.trim());
        window.location.href = DASHBOARD;
    });
</script>
</body>
</html>
